name: mesh_work
description: "MeshWork - e-bi Employee App for mobile office & field operations."
publish_to: 'none'
resolution: workspace
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # e-bi shared packages
  ebi_core:
    path: ../../packages/ebi_core
  ebi_ui_kit:
    path: ../../packages/ebi_ui_kit
  ebi_models:
    path: ../../packages/ebi_models
  ebi_chat:
    path: ../../packages/ebi_chat

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/locales/
