name: ebi_core
description: Core package for e-bi apps — networking (Dio), authentication, utilities.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  logger: ^2.5.0
  connectivity_plus: ^6.1.4
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.4
  ebi_models:
    path: ../ebi_models
  ebi_storage:
    path: ../ebi_storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
